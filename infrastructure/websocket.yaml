AWSTemplateFormatVersion: "2010-09-09"
Description: SBT real-time layer - API Gateway WebSocket API + connection tracking

Resources:
  WsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sbt-ws-lambda-role-dev
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ws-connections-table-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt ConnectionsTable.Arn

  WsConnectFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sbt-ws-connect-dev
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt WsLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {"status": "placeholder"}

  WsDisconnectFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sbt-ws-disconnect-dev
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt WsLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref ConnectionsTable
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {"status": "placeholder"}

  WsDefaultFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sbt-ws-default-dev
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt WsLambdaRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {"status": "placeholder"}
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sbt-ws-connections-dev
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: sbt-websocket-api-dev
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${ConnectIntegration}
  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${DisconnectIntegration}
  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      Target: !Sub integrations/${DefaultIntegration}
  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsConnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*
  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDisconnectFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*
  DefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WsDefaultFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*
  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: dev
      AutoDeploy: true

Outputs:
  ConnectionsTableName:
    Value: !Ref ConnectionsTable
    Export:
      Name: sbt-ws-connections-table-dev
  WebSocketUrl:
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/dev
  WebSocketCallbackUrl:
    Value: !Sub https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/dev
    Export:
      Name: sbt-ws-callback-url-dev
