AWSTemplateFormatVersion: "2010-09-09"
Description: SBT real-time layer - API Gateway WebSocket API + connection tracking

Resources:
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sbt-ws-connections-dev
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  ConnectionsTableName:
    Value: !Ref ConnectionsTable
